<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bộ Lọc & Tìm Kiếm Điểm</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>Quản lý Điểm Sinh Viên</h2>

    <div>
      <input type="text" id="nameInput" placeholder="Họ tên sinh viên" />
      <input
        type="number"
        id="scoreInput"
        placeholder="Điểm (0-10)"
        min="0"
        max="10"
        step="0.1"
      />
      <button id="addBtn">Thêm</button>
    </div>

    <br />

    <div>
      <input type="text" id="searchInput" placeholder="Tìm kiếm theo tên..." />
      <select id="filterSelect">
        <option value="Tất cả">Tất cả</option>
        <option value="Giỏi">Giỏi</option>
        <option value="Khá">Khá</option>
        <option value="Trung bình">Trung bình</option>
        <option value="Yếu">Yếu</option>
      </select>
    </div>

    <br />

    <table>
      <thead>
        <tr>
          <th>STT</th>
          <th>Họ tên</th>
          <th id="sortScoreBtn">Điểm <span id="sortArrow"></span></th>
          <th>Xếp loại</th>
          <th>Thao tác</th>
        </tr>
      </thead>
      <tbody id="studentTableBody"></tbody>
    </table>

    <br />

    <div>
      Tổng số sinh viên hiển thị: <span id="totalStudents">0</span> | Điểm trung
      bình: <span id="averageScore">0.00</span>
    </div>

    <script src="script.js"></script>
  </body>
</html>
