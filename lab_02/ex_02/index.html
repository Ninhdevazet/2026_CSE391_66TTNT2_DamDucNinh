<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Landing Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">TRAVEL GOALS</div>
      <nav>
        <a href="#">Destinations</a>
        <a href="#">About</a>
      </nav>
    </header>

    <main>
      <section class="hero-section">
        <div class="hero-box">
          <h1>JOE'S TRAVEL PAGE</h1>
          <p>LET'S EXPLORE THE WORLD TOGETHER!</p>
          <button>Discover places</button>
        </div>
      </section>

      <section class="highlights-section">
        <h2>HIGHLIGHTS</h2>
        <div class="cards-container">
          <div class="card">
            <img
              src=https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Miamimetroarea.jpg/250px-Miamimetroarea.jpg
              alt="Miami"
            />
            <p class="location-text">MIAMI <span>USA</span></p>
          </div>
          <div class="card">
            <img
              src=https://munich-info.info/wp-content/uploads/2020/05/Olympiatadion_Muenchen.jpg
              alt="Munich"
            />
            <p class="location-text">MUNICH <span>GERMANY</span></p>
          </div>
          <div class="card">
            <img
              src=https://www.adventuresbydisney.com/content/dam/abd/destinations/europe/3-night-barcelona-vacations/Barcelona.jpg.adapt.nineteen-hundred.jpg
              alt="Barcelona"
            />
            <p class="location-text">BARCELONA <span>SPAIN</span></p>
          </div>
        </div>
      </section>
    </main>
